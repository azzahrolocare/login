<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT JSON Fixer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; }
        #output { 
            min-height: 200px; background: #1e1e1e; color: #4af626; 
            padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; 
            white-space: pre-wrap; overflow-x: auto; margin-bottom: 15px; border: 1px solid #333;
        }
        textarea { width: 100%; height: 150px; border-radius: 8px; border: 1px solid #ccc; padding: 15px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-run { background: #1a73e8; color: white; }
        .btn-copy { background: #188038; color: white; }
        button:disabled { background: #ccc; }
        .log { font-size: 11px; color: #666; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>CBT JSON Generator (Auto-Fix)</h2>
    <div id="output">// Hasil akan muncul di sini...</div>
    <textarea id="userInput" placeholder="Tempel soal di sini..."></textarea>
    <div class="btn-group">
        <button id="btnRun" class="btn-run" onclick="startConversion()">Proses Soal</button>
        <button class="btn-copy" onclick="copyResult()">Salin JSON</button>
    </div>
    <div id="statusLog" class="log">Menunggu input...</div>
</div>

<script>
    async function startConversion() {
        const apiKey = "AIzaSyDRhhyBIZbGIkydx1CUfF8rDV3DDB2CbUs"; 
        const input = document.getElementById('userInput').value;
        const output = document.getElementById('output');
        const statusLog = document.getElementById('statusLog');
        const btn = document.getElementById('btnRun');

        if (!input.trim()) return alert("Masukkan soal dulu!");

        btn.disabled = true;
        output.innerText = "Menganalisis kunci API dan mencari model yang cocok...";

        // Daftar model yang akan dicoba satu per satu
        const models = [
            "gemini-pro",
            "gemini-1.5-flash-latest",
            "gemini-1.5-pro-latest",
            "gemini-1.0-pro"
        ];

        let success = false;

        for (let modelName of models) {
            if (success) break;
            
            statusLog.innerText = `Mencoba model: ${modelName}...`;
            
            try {
                // Mencoba versi v1 (Stabil)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: "Ubah teks ini jadi JSON array murni tanpa penjelasan: " + input }]
                        }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content) {
                    let result = data.candidates[0].content.parts[0].text;
                    output.innerText = result.replace(/```json/g, "").replace(/```/g, "").trim();
                    statusLog.innerText = `Berhasil menggunakan model: ${modelName}`;
                    success = true;
                }
            } catch (err) {
                console.log(`${modelName} gagal, lanjut...`);
            }
        }

        if (!success) {
            output.innerText = "SEMUA MODEL GAGAL.\n\nAnalisis Masalah:\n1. API Key Anda mungkin memiliki pembatasan (Restricted).\n2. Coba buat API Key BARU di Google AI Studio dan PASTIKAN klik 'Create API key in new project'.\n3. Jangan gunakan kunci lama yang sudah ada.";
            statusLog.innerText = "Gagal total.";
        }

        btn.disabled = false;
    }

    function copyResult() {
        navigator.clipboard.writeText(document.getElementById('output').innerText);
        alert("Tersalin!");
    }
</script>

</body>
</html>
