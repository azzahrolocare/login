<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Generator - Versi Final</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; margin-top: 0; }
        #output { 
            min-height: 200px; background: #202124; color: #34a853; 
            padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; 
            white-space: pre-wrap; overflow-x: auto; margin-bottom: 15px; border: 1px solid #3c4043;
        }
        textarea { width: 100%; height: 150px; border-radius: 8px; border: 1px solid #dadce0; padding: 15px; box-sizing: border-box; font-size: 14px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-run { background: #1a73e8; color: white; }
        .btn-copy { background: #188038; color: white; }
        button:disabled { background: #bdc1c6; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>CBT JSON Generator</h2>
    <div id="output">// Hasil akan muncul di sini...</div>
    <textarea id="userInput" placeholder="Tempel soal di sini (Contoh: 1. Apa itu... A... B...)"></textarea>
    <div class="btn-group">
        <button id="btnRun" class="btn-run" onclick="generateJSON()">Proses Soal</button>
        <button class="btn-copy" onclick="copyResult()">Salin JSON</button>
    </div>
</div>

<script>
    async function generateJSON() {
        // GANTI DENGAN API KEY BARU DARI AI STUDIO
        const apiKey = "AIzaSyCRRAd_LPk1sUFoZXgHTS-qfZkvcIX_skk"; 
        const input = document.getElementById('userInput').value;
        const output = document.getElementById('output');
        const btn = document.getElementById('btnRun');

        if (!input.trim()) return alert("Masukkan soal terlebih dahulu!");

        btn.disabled = true;
        btn.innerText = "Menghubungi Google AI...";
        output.innerText = "Sedang memproses...";

        // Gunakan v1beta dan model gemini-1.5-flash (paling stabil saat ini)
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        const payload = {
            contents: [{
                parts: [{
                    text: "Ubah teks berikut menjadi JSON array murni tanpa penjelasan. Format: " +
                           "[{\"id\": 1, \"pertanyaan\": \"\", \"pilihan\": [], \"jawaban\": index_angka}]. " +
                           "Pastikan indeks jawaban benar (0=A, 1=B, dst). SOAL: \n" + input
                }]
            }],
            generationConfig: {
                responseMimeType: "application/json",
                temperature: 0.1
            }
        };

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.error) {
                // Menampilkan alasan detail kenapa Google menolak
                output.innerText = "Ditolak Google: " + data.error.message + 
                                 "\n\nSaran: Coba buat API KEY baru di Google AI Studio.";
            } else if (data.candidates && data.candidates[0].content) {
                let result = data.candidates[0].content.parts[0].text;
                output.innerText = result.trim();
            } else {
                output.innerText = "Terjadi kesalahan respon: " + JSON.stringify(data);
            }
        } catch (err) {
            output.innerText = "Koneksi Gagal: " + err.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "Proses Soal";
        }
    }

    function copyResult() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text);
        alert("JSON Berhasil Disalin!");
    }
</script>

</body>
</html>
